<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Школа вожатого: Полный курс</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0B1A33;
            --accent: #00C48C;
            --accent-alt: #FFB800;
            --danger: #FF6B6B;
            --purple: #A855F7;
            --teal: #2DD4BF;
            --white: #ffffff;
            --dark: #060d1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--primary);
            color: var(--white);
            min-height: 100vh;
        }

        h1, h2, h3, h4 {
            font-family: 'Montserrat', sans-serif;
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, var(--dark) 0%, var(--primary) 100%);
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--teal), var(--accent-alt));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .progress-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .progress-bar-small {
            width: 150px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--teal), var(--accent-alt));
            transition: width 0.3s ease;
        }

        /* Tabs */
        .tabs-container {
            background: rgba(0,0,0,0.3);
            overflow-x: auto;
            padding: 0 20px;
        }

        .tabs {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 5px;
            padding: 10px 0;
        }

        .tab {
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 10px;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .tab:hover {
            background: rgba(255,255,255,0.1);
            color: var(--white);
        }

        .tab.active {
            background: var(--accent);
            color: var(--primary);
        }

        .tab.completed::after {
            content: ' ✓';
            color: var(--teal);
        }

        /* Main Content */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* Lesson Content */
        .lesson-area {
            min-height: 60vh;
        }

        .lesson-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .lesson-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lesson-content h2 {
            font-size: 1.8rem;
            color: var(--teal);
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(0, 196, 140, 0.3);
        }

        .lesson-content h3 {
            font-size: 1.3rem;
            color: var(--accent-alt);
            margin: 25px 0 15px;
        }

        .lesson-content p {
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 15px;
            color: rgba(255,255,255,0.85);
        }

        .quote-box {
            background: rgba(168, 85, 247, 0.15);
            border-left: 4px solid var(--purple);
            padding: 20px 25px;
            border-radius: 0 15px 15px 0;
            margin: 20px 0;
        }

        .quote-box p {
            font-style: italic;
            margin-bottom: 10px;
        }

        .quote-box .author {
            font-size: 0.9rem;
            color: var(--accent-alt);
        }

        .warning-box {
            background: rgba(255, 184, 0, 0.15);
            border: 2px solid var(--accent-alt);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            display: flex;
            gap: 15px;
        }

        .warning-box .icon {
            font-size: 2rem;
        }

        .info-box {
            background: rgba(0, 196, 140, 0.1);
            border: 1px solid var(--teal);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }

        /* Lists */
        .content-list {
            list-style: none;
            margin: 15px 0;
        }

        .content-list li {
            padding: 10px 0 10px 30px;
            position: relative;
            line-height: 1.6;
        }

        .content-list li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--teal);
            font-weight: bold;
        }

        .numbered-list {
            counter-reset: item;
            list-style: none;
            margin: 15px 0;
        }

        .numbered-list li {
            counter-increment: item;
            padding: 12px 0 12px 45px;
            position: relative;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .numbered-list li::before {
            content: counter(item);
            position: absolute;
            left: 0;
            top: 12px;
            width: 28px;
            height: 28px;
            background: var(--teal);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--primary);
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: var(--teal);
        }

        .card .icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .card h4 {
            color: var(--teal);
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
        }

        /* Quiz Section */
        .quiz-section {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
        }

        .quiz-section h3 {
            color: var(--accent-alt);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quiz-question {
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .quiz-question h4 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: var(--white);
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quiz-option {
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .quiz-option:hover {
            background: rgba(0, 196, 140, 0.1);
            border-color: var(--teal);
        }

        .quiz-option.correct {
            background: rgba(0, 196, 140, 0.3);
            border-color: var(--teal);
        }

        .quiz-option.wrong {
            background: rgba(255, 107, 107, 0.3);
            border-color: var(--danger);
        }

        .quiz-result {
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            text-align: center;
            font-weight: 600;
        }

        .quiz-result.show {
            display: block;
        }

        .quiz-result.success {
            background: rgba(0, 196, 140, 0.2);
            color: var(--teal);
        }

        .quiz-result.error {
            background: rgba(255, 107, 107, 0.2);
            color: var(--danger);
        }

        /* Sidebar */
        .sidebar {
            position: sticky;
            top: 20px;
        }

        .sidebar-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .sidebar-card h4 {
            font-size: 1rem;
            color: var(--teal);
            margin-bottom: 15px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: rgba(255,255,255,0.7);
        }

        .stat-value {
            font-weight: 700;
            color: var(--accent-alt);
        }

        .action-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--teal), var(--accent));
            border: none;
            border-radius: 12px;
            color: var(--primary);
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 196, 140, 0.3);
        }

        .action-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: var(--white);
        }

        /* Final Test */
        .final-test {
            display: none;
            padding: 30px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            margin-top: 30px;
        }

        .final-test.active {
            display: block;
        }

        .final-test h3 {
            color: var(--accent-alt);
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Certificate */
        .certificate {
            display: none;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, rgba(255, 184, 0, 0.1), rgba(0, 196, 140, 0.1));
            border: 3px solid var(--accent-alt);
            border-radius: 30px;
            margin-top: 30px;
        }

        .certificate.active {
            display: block;
            animation: certAppear 0.5s ease;
        }

        @keyframes certAppear {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .certificate h2 {
            font-size: 2rem;
            color: var(--accent-alt);
            margin-bottom: 20px;
        }

        .certificate p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .score {
            font-size: 3rem;
            font-weight: 800;
            color: var(--teal);
            margin: 20px 0;
        }

        /* Accordion */
        .accordion {
            margin: 15px 0;
        }

        .accordion-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .accordion-header {
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .accordion-header:hover {
            background: rgba(0, 196, 140, 0.1);
        }

        .accordion-toggle {
            color: var(--teal);
            transition: transform 0.3s ease;
        }

        .accordion-item.active .accordion-toggle {
            transform: rotate(45deg);
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            padding: 0 20px;
        }

        .accordion-item.active .accordion-content {
            max-height: 300px;
            padding: 0 20px 15px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .tabs {
                justify-content: flex-start;
            }
            
            .main-content {
                padding: 15px;
            }
            
            .lesson-content h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

        // State
        let state = {
            currentLesson: 1,
            completedLessons: new Set(),
            completedQuizzes: new Set(),
            lessonScores: {},
            showFinalTest: false
        };

        // Initialize
        function init() {
            renderTabs();
            renderLessons();
            updateProgress();
            loadState();
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('tabs');
            tabsContainer.innerHTML = courseData.lessons.map(lesson => `
                <button class="tab ${lesson.id === state.currentLesson ? 'active' : ''} ${state.completedLessons.has(lesson.id) ? 'completed' : ''}" 
                    onclick="goToLesson(${lesson.id})">
                    ${lesson.icon} ${lesson.title}
                </button>
            `).join('') + `
                <button class="tab" onclick="goToFinalTest()" style="border: 2px solid var(--accent-alt);">
                    🏆 Итоговый тест
                </button>
            `;
        }

        function renderLessons() {
            const container = document.getElementById('lessonContents');
            container.innerHTML = courseData.lessons.map(lesson => `
                <div class="lesson-content ${lesson.id === state.currentLesson ? 'active' : ''}" data-lesson="${lesson.id}">
                    ${lesson.content}
                    <div class="quiz-section" id="quiz-${lesson.id}">
                        <h3>📝 Мини-тест по теме</h3>
                        ${lesson.quiz.map((q, i) => `
                            <div class="quiz-question">
                                <h4>${i + 1}. ${q.question}</h4>
                                <div class="quiz-options">
                                    ${q.options.map((opt, j) => `
                                        <div class="quiz-option" onclick="checkAnswer(${lesson.id}, ${i}, ${j}, this)">${opt}</div>
                                    `).join('')}
                                </div>
                                <div class="quiz-result" id="result-${lesson.id}-${i}"></div>
                            </div>
                        `).join('')}
                        <button class="action-btn" onclick="finishLesson(${lesson.id})">Завершить урок</button>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('finalTest').classList.remove('active');
            document.getElementById('certificate').classList.remove('active');
        }

        function goToLesson(id) {
            state.currentLesson = id;
            state.showFinalTest = false;
            
            document.querySelectorAll('.lesson-content').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-lesson="${id}"]`).classList.add('active');
            
            document.querySelectorAll('.tab').forEach((tab, i) => {
                tab.classList.toggle('active', i + 1 === id);
            });
            
            window.scrollTo(0, 0);
        }

        function goToFinalTest() {
            state.showFinalTest = true;
            document.querySelectorAll('.lesson-content').forEach(el => el.classList.remove('active'));
            document.getElementById('finalTest').classList.add('active');
            document.getElementById('certificate').classList.remove('active');
            
            renderFinalTest();
            window.scrollTo(0, 0);
        }

        function renderFinalTest() {
            const allQuestions = [];
            courseData.lessons.forEach((lesson, li) => {
                lesson.quiz.forEach((q, qi) => {
                    allQuestions.push({
                        ...q,
                        lessonId: li + 1,
                        lessonTitle: lesson.title
                    });
                });
            });
            
            // Shuffle and pick 15
            const shuffled = allQuestions.sort(() => Math.random() - 0.5).slice(0, 15);
            
            document.getElementById('finalTestQuestions').innerHTML = shuffled.map((q, i) => `
                <div class="quiz-question">
                    <h4>${i + 1}. [${q.lessonTitle}] ${q.question}</h4>
                    <div class="quiz-options">
                        ${q.options.map((opt, j) => `
                            <div class="quiz-option" data-correct="${j === q.correct}" onclick="this.classList.add('checked')">${opt}</div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            
            window.finalQuestions = shuffled;
        }

        function checkAnswer(lessonId, questionIndex, selectedIndex, element) {
            const lesson = courseData.lessons.find(l => l.id === lessonId);
            const question = lesson.quiz[questionIndex];
            const options = element.parentElement.querySelectorAll('.quiz-option');
            
            options.forEach((opt, i) => {
                opt.style.pointerEvents = 'none';
                if (i === question.correct) opt.classList.add('correct');
                if (i === selectedIndex && i !== question.correct) opt.classList.add('wrong');
            });
            
            const result = document.getElementById(`result-${lessonId}-${questionIndex}`);
            const isCorrect = selectedIndex === question.correct;
            result.className = `quiz-result show ${isCorrect ? 'success' : 'error'}`;
            result.textContent = isCorrect ? '✓ Правильно!' : '✗ Неверно';
        }

        function finishLesson(lessonId) {
            state.completedLessons.add(lessonId);
            state.completedQuizzes.add(lessonId);
            saveState();
            updateProgress();
            
            if (lessonId < 12) {
                goToLesson(lessonId + 1);
            } else {
                goToFinalTest();
            }
        }

        function checkFinalTest() {
            const questions = document.querySelectorAll('#finalTestQuestions .quiz-option.checked');
            let correct = 0;
            
            questions.forEach(q => {
                if (q.classList.contains('correct')) correct++;
            });
            
            const total = window.finalQuestions.length;
            const percent = Math.round((correct / total) * 100);
            
            document.getElementById('finalScore').textContent = percent + '%';
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('totalCount').textContent = total;
            
            document.getElementById('finalResult').className = `quiz-result show ${percent >= 70 ? 'success' : 'error'}`;
            document.getElementById('finalResult').textContent = percent >= 70 
                ? `Поздравляем! Вы прошли итоговый тест! (${correct}/${total})` 
                : `Нужно набрать минимум 70%. Ваш результат: ${percent}%`;
            
            if (percent >= 70) {
                document.getElementById('certificate').classList.add('active');
            }
        }

        function updateProgress() {
            const completed = state.completedLessons.size;
            const total = courseData.lessons.length;
            const percent = Math.round((completed / total) * 100);
            
            document.getElementById('headerProgress').style.width = percent + '%';
            document.getElementById('progressText').textContent = percent + '%';
            document.getElementById('lessonsCompleted').textContent = `${completed}/${total}`;
            document.getElementById('testsCompleted').textContent = `${state.completedQuizzes.size}/${total}`;
            document.getElementById('totalScore').textContent = percent + '%';
            
            renderTabs();
        }

        function saveState() {
            localStorage.setItem('counselorCourse', JSON.stringify({
                completedLessons: Array.from(state.completedLessons),
                completedQuizzes: Array.from(state.completedQuizzes)
            }));
        }

        function loadState() {
            const saved = localStorage.getItem('counselorCourse');
            if (saved) {
                const data = JSON.parse(saved);
                state.completedLessons = new Set(data.completedLessons);
                state.completedQuizzes = new Set(data.completedQuizzes);
                updateProgress();
            }
        }

        function restartCourse() {
            if (confirm('Сбросить весь прогресс?')) {
                localStorage.removeItem('counselorCourse');
                state = {
                    currentLesson: 1,
                    completedLessons: new Set(),
                    completedQuizzes: new Set(),
                    lessonScores: {},
                    showFinalTest: false
                };
                goToLesson(1);
                updateProgress();
            }
        }

        // Initialize
        init();
    </script>
